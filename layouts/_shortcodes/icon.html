</span>
{{- else if eq $name "email" -}}
<span class="stack-icon stack-icon--emoji" aria-hidden="true">✉️</span>
{{- else if eq $name "globe" -}}
<span class="stack-icon stack-icon--emoji" aria-hidden="true">🌐</span>
{{- else if eq $name "shield" -}}
<span class="stack-icon stack-icon--emoji" aria-hidden="true">🛡️</span>
{{- else if eq $name "lock" -}}
<span class="stack-icon stack-icon--emoji" aria-hidden="true">🔒</span>
{{- else -}}
<span class="stack-icon stack-icon--emoji" aria-hidden="true">•</span>
{{- end -}}
