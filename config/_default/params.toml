mainSections = ["posts"]
rssFullContent = true
favicon = ""
SortBy = "default"

[footer]
    since = 2022
    customText = "Backend, infra, and long-form technical notes."

[dateFormat]
    published = "2006-01-02"
    lastUpdated = "2006-01-02"

[sidebar]
    compact = false
    emoji = ""
    subtitle = "Deep Dive into Backend"
    avatar = "img/profile1.jpg"

[article]
    headingAnchor = true
    math = false
    toc = true
    readingTime = true

    [article.list]
        showTags = false

    [article.license]
        enabled = false
        default = "Licensed under CC BY-NC-SA 4.0"

    [article.mermaid]
        look = "classic"
        lightTheme = "default"
        darkTheme = "dark"
        securityLevel = "loose"
        htmlLabels = true
        transparentBackground = false

[widgets]
    homepage = [
        { type = "search" },
        { type = "archives", params = { limit = 5 } },
        { type = "categories", params = { limit = 10 } },
        { type = "tag-cloud", params = { limit = 10 } },
    ]
    page = [
        { type = "toc" },
    ]

[opengraph.twitter]
    site = ""
    card = "summary_large_image"

[colorScheme]
    toggle = true
    default = "auto"

[imageProcessing]
    autoOrient = false

    [imageProcessing.external]
        timeout = "5s"

    [imageProcessing.content]
        widths = [800, 1600, 2400]
        enabled = true

    [imageProcessing.thumbnail]
        enabled = true

[cookies]
    enabled = false
    showSettings = true

    [cookies.categories]
        analytics = true
        functional = true

[comments]
    enabled = true
    provider = "giscus"

    [comments.giscus]
        repo = "0AndWild/0AndWild.github.io"
        repoID = "R_kgDOQAqZFA"
        category = "General"
        categoryID = "DIC_kwDOQAqZFM4CwwRg"
        mapping = "specific"
        lightTheme = "catppuccin_latte"
        darkTheme = "catppuccin_frappe"
        reactionsEnabled = 1
        emitMetadata = 0
        inputPosition = "top"
        lang = "ko"
        strict = 0
        loading = "lazy"

