<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Member object graph relationship</title>
  <desc id="desc">A simple object relationship graph with undirected lines between Member, Team, Order, OrderItem, Item, Category, and Delivery.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <linearGradient id="memberFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ecfeff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="nodeFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="520" rx="28" fill="#f8fafc"/>
  <path d="M80 80 H1120 M80 180 H1120 M80 280 H1120 M80 380 H1120 M200 52 V468 M400 52 V468 M600 52 V468 M800 52 V468 M1000 52 V468" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="8 10"/>

  <g stroke="#64748b" stroke-width="5" stroke-linecap="round">
    <line x1="320" y1="245" x2="535" y2="155"/>
    <line x1="320" y1="275" x2="535" y2="365"/>
    <line x1="665" y1="365" x2="765" y2="365"/>
    <line x1="895" y1="365" x2="995" y2="365"/>
    <line x1="1060" y1="315" x2="1060" y2="205"/>
    <line x1="600" y1="415" x2="600" y2="455"/>
  </g>

  <g font-family="Inter, Pretendard, Segoe UI, Arial, sans-serif" font-weight="700" text-anchor="middle">
    <g filter="url(#shadow)">
      <rect x="180" y="220" width="140" height="80" rx="16" fill="url(#memberFill)" stroke="#0f766e" stroke-width="3"/>
      <text x="250" y="268" font-size="28" fill="#134e4a">Member</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="535" y="115" width="130" height="80" rx="16" fill="url(#nodeFill)" stroke="#2563eb" stroke-width="3"/>
      <text x="600" y="163" font-size="27" fill="#1e3a8a">Team</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="535" y="325" width="130" height="80" rx="16" fill="url(#nodeFill)" stroke="#7c3aed" stroke-width="3"/>
      <text x="600" y="373" font-size="27" fill="#4c1d95">Order</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="765" y="325" width="130" height="80" rx="16" fill="url(#nodeFill)" stroke="#0891b2" stroke-width="3"/>
      <text x="830" y="373" font-size="25" fill="#155e75">OrderItem</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="995" y="325" width="130" height="80" rx="16" fill="url(#nodeFill)" stroke="#ea580c" stroke-width="3"/>
      <text x="1060" y="373" font-size="27" fill="#7c2d12">Item</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="975" y="115" width="170" height="80" rx="16" fill="url(#nodeFill)" stroke="#16a34a" stroke-width="3"/>
      <text x="1060" y="163" font-size="27" fill="#14532d">Category</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="515" y="455" width="170" height="50" rx="14" fill="url(#nodeFill)" stroke="#dc2626" stroke-width="3"/>
      <text x="600" y="488" font-size="25" fill="#7f1d1d">Delivery</text>
    </g>
  </g>
</svg>
